<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>管理后台 | TXW.sec</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif;background:#0a0a0f;color:#e0e0e0;display:flex;min-height:100vh}
    .sidebar{width:220px;background:rgba(15,15,30,0.95);border-right:1px solid rgba(255,255,255,0.06);padding:24px 0;position:fixed;height:100vh;overflow-y:auto}
    .sidebar h2{font-size:1rem;padding:0 20px;margin-bottom:24px;color:#0ef;font-family:"JetBrains Mono",monospace}
    .sidebar a{display:block;padding:10px 20px;color:#8892a4;font-size:0.88rem;cursor:pointer;transition:.2s;border-left:2px solid transparent}
    .sidebar a:hover,.sidebar a.active{color:#e0e0e0;border-left-color:#0ef;background:rgba(0,238,255,0.04)}
    .main{margin-left:220px;flex:1;padding:32px;max-width:calc(100% - 220px)}
    .main h1{font-size:1.5rem;margin-bottom:24px}
    .panel{display:none}.panel.active{display:block}
    .form-group{margin-bottom:16px}
    .form-group label{display:block;font-size:0.82rem;color:#8892a4;margin-bottom:6px}
    .form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:#e0e0e0;font-size:0.9rem;outline:none;transition:.3s;font-family:inherit}
    .form-group textarea{min-height:80px;resize:vertical}
    .form-group input:focus,.form-group textarea:focus{border-color:#0ef}
    .btn{padding:10px 20px;border:none;border-radius:6px;font-size:0.9rem;cursor:pointer;transition:.3s;font-family:inherit}
    .btn-primary{background:#0ef;color:#0a0a0f;font-weight:600}.btn-primary:hover{box-shadow:0 0 20px rgba(0,238,255,0.3)}
    .btn-danger{background:rgba(255,71,87,0.15);color:#ff4757;border:1px solid rgba(255,71,87,0.2)}.btn-danger:hover{background:rgba(255,71,87,0.25)}
    .btn-sm{padding:6px 12px;font-size:0.78rem}
    .list-item{background:rgba(15,15,30,0.6);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:.3s}
    .list-item:hover{border-color:rgba(0,238,255,0.15)}
    .list-item .content{flex:1}.list-item .actions{display:flex;gap:8px}
    .toast{position:fixed;bottom:24px;right:24px;padding:12px 24px;border-radius:8px;font-size:0.9rem;z-index:999;animation:fadeIn .3s;display:none}
    .toast.success{background:#00ff88;color:#0a0a0f}.toast.error{background:#ff4757;color:#fff}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
<div class="sidebar">
  <h2>🔐 TXW.sec Admin</h2>
  <a class="active" onclick="switchPanel('info')">📋 基本信息</a>
  <a onclick="switchPanel('skills')">🛠 技术能力</a>
  <a onclick="switchPanel('projects')">📦 项目管理</a>
  <a onclick="switchPanel('awards')">🏆 荣誉奖项</a>
  <a onclick="switchPanel('certs')">📜 专业认证</a>
  <a onclick="switchPanel('ctf')">⚔️ CTF竞赛</a>
  <a onclick="switchPanel('education')">🎓 教育经历</a>
  <a onclick="switchPanel('blog')">📝 CSDN博客</a>
  <a onclick="switchPanel('site')">⚙️ 站点配置</a>
  <a href="/admin/logout" style="margin-top:20px;color:#ff4757">🚪 退出登录</a>
</div>
<div class="main" id="mainContent">
  <h1 id="panelTitle">📋 基本信息</h1>
  <div id="panelInfo" class="panel active"></div>
  <div id="panelSkills" class="panel"></div>
  <div id="panelProjects" class="panel"></div>
  <div id="panelAwards" class="panel"></div>
  <div id="panelCerts" class="panel"></div>
  <div id="panelCtf" class="panel"></div>
  <div id="panelEducation" class="panel"></div>
  <div id="panelBlog" class="panel"></div>
  <div id="panelSite" class="panel"></div>
</div>
<div id="toast" class="toast"></div>
<script src="/static/js/admin.js"></script>
</body>
</html>
